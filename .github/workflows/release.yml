name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"   # matches 0.9.0, 1.0.0 etc. — no "v" prefix (Obsidian requirement)

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title "$tag" \
            --notes "Release $tag" \
            main.js \
            manifest.json \
            styles.css
